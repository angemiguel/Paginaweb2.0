                <h3 id="proposito">¿De qué trata esta página?</h3>
                <p>Esta página tratará de explicar el Juego de la Vida de Conway mediante distintas pestañas, cumpliendo
                    los requisitos pedidos por el maestro.</p><br>

                <h3 id="origen">El genio detrás: John Horton Conway</h3>
                <p>John Conway fue un matemático británico que revolucionó el campo de las matemáticas recreativas.
                    Aunque hizo contribuciones serias en teoría de grupos y números surreales, siempre será recordado
                    por este autómata celular creado en 1970.</p>

                <h3 id="filosofia">¿Qué es exactamente y por qué este tema?</h3>
                <p>El Juego de la Vida de Conway no es exactamente un videojuego, sino una simulación matemática
                    infinita en la cual, cumpliendo ciertas reglas, podríamos crear teóricamente cualquier cosa.

                    Creé esta página con este tema porque, a lo largo de los años, siempre se me han hecho muy
                    interesantes
                    las matemáticas. El cómo funciona este "juego" son cosas tan interesantes que desearía compartir con
                    cualquiera que lea esta página.
                </p>

                <h3>¿Por qué el diseño de la página es distinto?</h3>
                <p>Aunque este diseño no creo que llegue a cumplir con todos los requisitos necesarios, quería hacerla
                    de un
                    estilo diferente, uno un poco más único, y aunque es mi primera vez haciendo este estilo, espero que
                    sea del
                    agrado del lector interesado en la misma.
                </p>

                <h3 id="definicion">Explicación detallada</h3>
                <p>Si no estás interesado en leer la explicación técnica, puedes ver el video al final de esta sección
                    que lo explica de forma muy entretenida.</p>

                <p>El Juego de la Vida (o Conway's Game of Life) no es un videojuego de ganar o perder.
                    Es lo que los matemáticos llaman un autómata celular. Imagina que es un ecosistema que vive en una
                    cuadrícula
                    y que evoluciona por sí solo basándose en unas pocas reglas simples.</p>

                <h3 id="reglas-mundo">Mundo del juego</h3>

                <ul>
                    <li>Imagina que el mundo es una hoja de papel cuadriculado infinita.</li>
                </ul>
                <p>[]][][][][][][][][][][][][][][][][][][][][][][][][][]</p>

                <ul>
                    <li>Cada cuadrado es una celda.</li>
                </ul>
                <p>[][][][][][][][][][][][][][][][][][][][][][][][][][][]</p>

                <ul>
                    <li>Una celda puede estar en uno de dos estados: Viva (llena de color) [X] o Muerta (vacía) [ ].
                    </li>
                </ul>
                <p>[][][][][][][][][][][][][][][][][][][][][][][][][][][]</p>
                <ul>
                    <li> Cada celda tiene 8 vecinas (las que la rodean en horizontal, vertical y diagonal).</li>
                </ul>
                <p>Estas serían las reglas del mundo, muy sencillas, pero de esta sencillez vienen cosas
                    <strong>increíbles</strong>.
                </p>

                <h3 id="reglas-celulas">Reglas de las Células</h3>
                <p>El juego avanza por "turnos" o generaciones.
                    En cada paso, todas las celdas deciden si vivirán o morirán
                    en el siguiente turno aplicando estas cuatro reglas:
                <ol>
                    <li><strong>Muerte por Soledad</strong>: Si una celda viva tiene menos de 2 vecinas vivas, muere.
                        <br>(Es como si se sintiera aislada).
                    </li><br>

                    <li><strong>Supervivencia</strong>: Si una celda viva tiene 2 o 3 vecinas vivas, sigue viva en el
                        siguiente turno.</li><br>

                    <li><strong>Muerte por Sobrepoblación</strong>: Si una celda viva tiene más de 3 vecinas vivas,
                        muere. (Demasiada competencia por los recursos).</li><br>

                    <li><strong>Nacimiento</strong>: Si una celda muerta tiene exactamente 3 vecinas vivas, "nace" (se
                        vuelve viva).</li>
                </ol>
                </p>

                <h3 id="variantes">Variantes y Curiosidades</h3>
                <p>Existen variantes como <strong>HighLife</strong> o <strong>Seeds</strong> que cambian solo un número
                    en las reglas, resultando en mundos totalmente caóticos o explosivos. El Juego de la Vida original
                    es "Turing Completo", lo que significa que puedes construir una computadora funcional dentro del
                    juego usando solo estas reglas.</p>

                <p>Ya que más o menos entiendes cómo funcionan las reglas del juego, empieza lo interesante.</p>
                <h3>Patrones</h3>
                <p>En el juego podemos crear múltiples patrones que, por cómo funcionan las reglas,
                    se vuelven creaciones increíbles. Me gustaría empezar por un patrón básico
                    que sería:</p>

                <h2>Vidas estáticas</h2>
                <p>Son configuraciones que se mantienen inalterables a lo largo del tiempo.
                    Las células vivas tienen suficientes vecinas para sobrevivir y ninguna
                    célula muerta cumple las condiciones para revivir,
                    por lo que permanecen estables para siempre.</p>

                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f4/Game_of_life_block.png/100px-Game_of_life_block.png"
                    alt="Bloque" title="Bloque">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/67/Game_of_life_beehive.png/100px-Game_of_life_beehive.png"
                    alt="Colmena" title="Colmena">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f4/Game_of_life_loaf.png/100px-Game_of_life_loaf.png"
                    alt="Hogaza" title="Hogaza">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7f/Game_of_life_boat.png/100px-Game_of_life_boat.png"
                    alt="Barco" title="Barco">

                <h2>Naves espaciales (Spaceships)</h2>
                <p>Son configuraciones iniciales pequeñas que, sorprendentemente, tardan mucho tiempo en estabilizarse o
                    desaparecer,
                    pasando por una gran cantidad de generaciones antes de alcanzar un estado fijo o disolverse.</p>
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/37/Game_of_life_animated_LWSS.gif"
                    alt="Nave espacial ligera" height="150">


                <h2>Gliders (Deslizadores)</h2>
                <p>Los "Gliders" o "Deslizadores" son la nave espacial más simple y conocida en el Juego de la Vida. Se
                    mueven diagonalmente a través de la cuadrícula, cambiando su forma en un ciclo de cuatro
                    generaciones. Son increíblemente importantes porque pueden interactuar entre sí y con otros
                    patrones, siendo los "bloques de construcción" fundamentales para crear estructuras mucho más
                    complejas, como computadoras o generadores de nuevos gliders.</p>
                <img src="https://upload.wikimedia.org/wikipedia/commons/f/f2/Game_of_life_animated_glider.gif"
                    alt="Glider moviéndose" height="100">
                <br>
                <br>

                <h2>Osciladores</h2>
                <p>Los osciladores son patrones que no se mueven, pero cambian su forma cíclicamente, volviendo a su
                    configuración original después de un número fijo de generaciones. Son fascinantes porque muestran
                    cómo la vida puede mantenerse en un estado dinámico sin necesidad de expandirse o morir por
                    completo. Ejemplos comunes incluyen el "Blinker" (parpadeante), que alterna entre una línea
                    horizontal y vertical, y el "Toad" (sapo).</p>
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/9/95/Game_of_life_blinker.gif"
                        alt="Blinker" height="80">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/1/12/Game_of_life_toad.gif" alt="Toad"
                        height="80">
                </div>
                <br>

                <h2>El Cañón de Planeadores (Gosper Glider Gun)</h2>
                <p>Este es uno de los patrones más famosos. Fue el primer patrón descubierto que crece infinitamente,
                    creando un nuevo "Glider" cada 30 generaciones. Este descubrimiento demostró que el Juego de la Vida
                    podía ser usado para construir sistemas complejos de computación.</p>
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e0/Game_of_life_animated_glider_gun.gif"
                    alt="Cañón de Gliders" height="200">
                <br>
                <br>
